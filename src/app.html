<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- SEO Meta Tags -->
		<title>Andrés Quiroga | Portafolio Full-Stack Junior</title>
		<meta
			name="description"
			content="Portafolio de Andrés Quiroga, Ingeniero de Sistemas y Desarrollador Full-Stack Junior. Proyectos con Svelte, Java/Spring Boot, Angular, Node.js y enfoque end-to-end."
		/>
		<meta
			name="keywords"
			content="andrés quiroga, full stack junior, svelte, spring boot, angular, node.js, portfolio, desarrollador junior"
		/>
		<meta name="author" content="Andrés Quiroga" />

		<!-- Open Graph / Social Media -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Andrés Quiroga Portfolio" />
		<meta property="og:title" content="Andrés Quiroga | Portafolio Full-Stack Junior" />
		<meta
			property="og:description"
			content="Portafolio profesional de desarrollo full-stack con proyectos end-to-end. Incluye un laboratorio retro interactivo como showcase creativo en Svelte."
		/>
		<meta property="og:url" content="https://quirogama.github.io/" />
		<meta property="og:image" content="https://quirogama.github.io/icons/windows_logo.jpg" />
		<meta property="og:locale" content="es_CO" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Andrés Quiroga | Portafolio Full-Stack Junior" />
		<meta
			name="twitter:description"
			content="Ingeniero de Sistemas y Desarrollador Full-Stack Junior con proyectos end-to-end."
		/>
		<meta name="twitter:image" content="https://quirogama.github.io/icons/windows_logo.jpg" />

		<link rel="canonical" href="https://quirogama.github.io/" />

		<!-- JSON-LD: Perfil y Portfolio para máquinas/SEO -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Person",
				"name": "Andrés Quiroga",
				"url": "https://quirogama.github.io/",
				"sameAs": ["https://github.com/Quirogama"],
				"jobTitle": "Ingeniero de Sistemas | Desarrollador Full-Stack Junior",
				"knowsAbout": [
					"Java",
					"Spring Boot",
					"Angular",
					"Svelte",
					"Node.js",
					"APIs REST",
					"PostgreSQL"
				],
				"description": "Portafolio de Andrés Quiroga con experiencia en desarrollo full-stack y construcción de aplicaciones end-to-end.",
				"inLanguage": "es-CO"
			}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
